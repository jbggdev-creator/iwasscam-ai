services:
  - type: web
    name: iwasscam-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerCommand: ./start.sh
    region: singapore
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://frontend-six-kappa-31.vercel.app
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: LOG_FORMAT
        value: json
      - key: CLAMAV_ENABLED
        value: "false"
      - key: USE_LLM
        value: "false"
